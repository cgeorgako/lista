<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a7f4b">
<link rel="manifest" href="manifest.json">
<title>Λίστα Αγορών</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f7f5;min-height:100vh;color:#1a1a1a}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#loginScreen{background:linear-gradient(160deg,#1a7f4b 0%,#0d5c35 100%);align-items:center;justify-content:center;padding:1.5rem}
.login-box{background:#fff;border-radius:20px;padding:1.4rem 1.8rem;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.app-icon{font-size:40px;margin-bottom:0.3rem}
.login-box h1{font-size:1.3rem;font-weight:700;color:#1a7f4b;margin-bottom:0.2rem}
.mode-btn{width:100%;padding:0.65rem;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-bottom:0.5rem;transition:all 0.15s}
.mode-btn:active{transform:scale(0.97)}
.mode-btn.primary{background:#1a7f4b;color:#fff;border:none}
.mode-btn.secondary{background:#fff;color:#1a7f4b;border:2px solid #1a7f4b}
.pin-label{font-size:0.78rem;color:#888;margin-bottom:0.4rem;margin-top:0.4rem}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:0.8rem}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;background:transparent;transition:all 0.2s}
.pin-dot.filled{background:#1a7f4b;border-color:#1a7f4b}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.num-btn{padding:0.75rem;border:none;border-radius:12px;background:#f5f5f5;font-size:1.15rem;font-weight:600;cursor:pointer;transition:all 0.15s;color:#1a1a1a}
.num-btn:active{background:#e0e0e0;transform:scale(0.95)}
.num-btn.del{background:#fff3f3;color:#e53935}
.err-msg{color:#e53935;font-size:0.78rem;margin-top:0.5rem;min-height:1rem}
.back-btn{background:none;border:none;color:#999;font-size:0.78rem;cursor:pointer;margin-top:0.3rem;padding:0.3rem 0.75rem;border-radius:8px}
.app-header{background:#1a7f4b;color:#fff;padding:1rem 1.25rem 0.75rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.app-header h2{font-size:1.1rem;font-weight:700;flex:1}
.hdr-sub{font-size:0.75rem;opacity:0.8;display:block}
.hdr-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:10px;padding:8px 12px;font-size:0.82rem;cursor:pointer}
.fab-list{position:fixed;bottom:24px;right:16px;z-index:200;background:#880e4f;color:#fff;border:none;border-radius:24px;padding:10px 18px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(136,14,79,0.45);display:flex;align-items:center;gap:8px}
.fab-add{position:fixed;bottom:24px;right:16px;z-index:200;background:#e65100;color:#fff;border:none;border-radius:24px;padding:10px 18px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(230,81,0,0.45);display:flex;align-items:center;gap:8px}
.fab-badge{background:#fff;color:#1a7f4b;border-radius:50%;width:22px;height:22px;font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.content-area{flex:1;overflow-y:auto;padding:0.75rem;padding-bottom:5rem}
.add-bar{display:flex;gap:8px;margin-bottom:0.75rem}
.add-bar input{flex:1;padding:0.65rem 1rem;border:1.5px solid #e0e0e0;border-radius:12px;font-size:0.9rem;background:#fff;outline:none;text-transform:uppercase}
.add-bar input:focus{border-color:#1a7f4b}
.btn-add{padding:0.65rem 1rem;background:#1a7f4b;color:#fff;border:none;border-radius:12px;font-size:1.2rem;cursor:pointer;flex-shrink:0}
.btn-fav{padding:0.65rem 0.3rem;background:#fff0f0;border:1.5px solid #ffb3b3;border-radius:12px;font-size:1.1rem;cursor:pointer;flex-shrink:0}
.btn-mic{padding:0.65rem 0.9rem;background:#f0f0f0;border:none;border-radius:12px;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all 0.2s}
.btn-mic.recording{background:#fff0f0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.75rem}
.prod-btn{padding:0.6rem 0.5rem;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;font-size:0.78rem;color:#444;cursor:pointer;text-align:center;transition:all 0.2s;text-transform:uppercase}
.prod-btn:active{background:#f0faf5;border-color:#1a7f4b}
.prod-btn.fav{border:2.5px solid #e53935;background:#fff8f8;color:#c62828;font-weight:600}
.section-lbl{font-size:0.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin:0.5rem 0 0.4rem;padding-left:2px}
.list-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:0.8rem 1rem;margin-bottom:8px;border:1px solid #f0f0f0;animation:slideIn 0.25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.list-item.done{opacity:0.4}
.list-item.done .item-name{text-decoration:line-through;color:#aaa}
.list-item.is-fav{border-left:3px solid #e53935}
.item-check{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.item-check.checked{background:#1a7f4b;border-color:#1a7f4b;color:#fff}
.item-body{flex:1;cursor:pointer;min-width:0}
.item-name{font-size:0.9rem;text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-qty-badge{font-size:0.72rem;color:#fff;background:#1a7f4b;border-radius:8px;padding:1px 7px;font-weight:600;white-space:nowrap}
.item-qty-add{font-size:0.7rem;color:#bbb;border-bottom:1px dashed #ccc}
.item-price-badge{font-size:0.72rem;color:#fff;background:#e65100;border-radius:8px;padding:1px 7px;font-weight:600;white-space:nowrap}
.item-brand{font-size:0.72rem;color:#e65100;font-style:italic;display:block;margin-top:2px}
.item-cat{font-size:0.7rem;color:#999;display:block;margin-top:2px}
.item-posokanei{background:none;border:none;cursor:pointer;padding:2px;flex-shrink:0;text-align:center;font-size:0.88rem;line-height:1.1}
.item-del{background:none;border:none;color:#ddd;font-size:1.1rem;cursor:pointer;padding:3px;flex-shrink:0}
.empty-state{text-align:center;padding:3rem 1rem;color:#aaa}
.empty-state .es-icon{font-size:3rem;margin-bottom:0.5rem}
.badge{background:#e8f5ee;color:#1a7f4b;border-radius:20px;padding:2px 10px;font-size:0.75rem;font-weight:600}
.status-bar{padding:0.5rem 1rem;font-size:0.78rem;display:flex;align-items:center;gap:6px;background:#fff3cd;color:#856404}
.status-bar.ok{background:#d4edda;color:#155724}
.status-bar.err{background:#f8d7da;color:#721c24}
.dot-pulse{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.sugg-item{padding:0.65rem 1rem;font-size:0.9rem;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background 0.15s;text-transform:uppercase}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover,.sugg-item.sugg-sel{background:#f0faf5;color:#1a7f4b}
.qty-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.qty-sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:420px}
.ubu{flex:1;padding:0.5rem;border-radius:10px;border:1.5px solid #e0e0e0;background:#fff;color:#555;font-size:0.82rem;cursor:pointer;transition:all 0.15s}
.ubu.sel{border-color:#1a7f4b;background:#f0faf5;color:#1a7f4b;font-weight:600}
/* ── PRINT / PDF ── */
#printHeader{display:none}
@media print{
  #loginScreen,.app-header,.status-bar,#fabBtn,#fabAddBtn,
  #totalCostBox,.item-check,.item-del,.item-posokanei,.share-row{display:none!important}
  .content-area{overflow:visible!important;padding:0!important}
  body{background:#fff!important}
  .list-item{box-shadow:none!important;border:none!important;border-bottom:1px solid #eee!important;
    border-radius:0!important;animation:none!important;margin:0!important;padding:0.4rem 0!important}
  .list-item.done{display:none!important}
  .section-lbl{color:#1a7f4b!important;margin-top:0.75rem!important}
  #printHeader{display:block!important;padding:0.5rem 0 0.75rem}
  .item-price-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="app-icon">🛒</div>
    <div style="display:flex;justify-content:center;gap:16px;margin-bottom:0.5rem">
      <span style="font-size:1.8rem">🇬🇷</span>
      <a href="english.html" style="font-size:1.8rem;text-decoration:none;opacity:0.5">🇬🇧</a>
    </div>
    <h1>Λίστα Αγορών</h1>
    <p style="font-family:'Georgia',serif;font-size:0.95rem;color:#e65100;font-style:italic;margin-bottom:0.75rem">Μην ξεχάσεις να πάρεις !</p>
    <div id="modeSelect">
      <button class="mode-btn primary" onclick="selectMode('create')">➕ Δημιουργία νέου λογαριασμού</button>
      <button class="mode-btn secondary" onclick="selectMode('join')">🔑 Σύνδεση με το PIN</button>
    </div>
    <div id="autoLoginMsg" style="display:none;padding:1rem 0;color:#1a7f4b;font-size:0.9rem">⏳ Σύνδεση...</div>
    <div id="pinEntry" style="display:none">
      <div class="pin-label" id="modeLabel">Εισάγετε PIN</div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
        <div class="pin-dot" id="d4"></div><div class="pin-dot" id="d5"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="addDigit('1')">1</button>
        <button class="num-btn" onclick="addDigit('2')">2</button>
        <button class="num-btn" onclick="addDigit('3')">3</button>
        <button class="num-btn" onclick="addDigit('4')">4</button>
        <button class="num-btn" onclick="addDigit('5')">5</button>
        <button class="num-btn" onclick="addDigit('6')">6</button>
        <button class="num-btn" onclick="addDigit('7')">7</button>
        <button class="num-btn" onclick="addDigit('8')">8</button>
        <button class="num-btn" onclick="addDigit('9')">9</button>
        <button class="num-btn" onclick="clearPin()">C</button>
        <button class="num-btn" onclick="addDigit('0')">0</button>
        <button class="num-btn del" onclick="delDigit()">⌫</button>
      </div>
      <div class="err-msg" id="errMsg"></div>
      <label style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.78rem;color:#888;margin-top:0.4rem;cursor:pointer">
        <input type="checkbox" id="rememberPin" style="width:15px;height:15px;accent-color:#1a7f4b">
        Να θυμάσαι το PIN
      </label>
      <button class="back-btn" onclick="backToMode()">← Πίσω</button>
    </div>
    <p style="font-size:0.68rem;color:#aaa;font-style:italic;margin-top:0.75rem">Σχεδιασμός: Χρήστος Γεωργακόπουλος — 06/2026</p>
    <button id="installBtn" onclick="installApp()" style="display:none;margin-top:0.75rem;width:100%;padding:0.65rem;background:#1a7f4b;color:#fff;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;align-items:center;justify-content:center;gap:8px">
      📲 Εγκατάσταση εφαρμογής
    </button>
    <div id="iosInstallHint" style="display:none;margin-top:0.75rem;padding:0.65rem;background:#e8f5ee;border-radius:12px;font-size:0.75rem;color:#1a7f4b;text-align:left;line-height:1.5">
      📱 <b>Εγκατάσταση στο iPhone:</b><br>Safari → Κοινοποίηση 📤 → «Προσθήκη στην Αρχική Οθόνη»
    </div>
  </div>
</div>

<div id="mainScreen" class="screen">
  <div class="app-header">
    <div style="flex:1"><h2>🛒 Λίστα Αγορών</h2><span class="hdr-sub" id="hdrSub"></span></div>
    <button class="hdr-btn" onclick="logout()">Έξοδος</button>
  </div>
  <div id="statusBar" class="status-bar"><div class="dot-pulse"></div><span id="statusTxt">Σύνδεση...</span></div>
  <div id="totalCostBox" style="display:none;position:fixed;top:72px;right:16px;z-index:150;background:#fff;border:2px solid #e65100;color:#e65100;border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.12)">
    💰 €<span id="totalCostVal">0.00</span>
  </div>
  <div id="printHeader"></div>
  <div class="content-area" id="contentArea"></div>
  <button class="fab-list" id="fabBtn" onclick="setTab('all')" style="display:none">
    📋 Λίστα <span class="fab-badge" id="fabBadge">0</span>
  </button>
  <button class="fab-add" id="fabAddBtn" onclick="setTab('add')" style="display:none">
    ➕ Προσθήκη
  </button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove, update, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig={
  apiKey:"AIzaSyC3drMmRGbykwTInDbRhLwdG9ulRz8Iq_0",
  authDomain:"lista-agoron-ea924.firebaseapp.com",
  databaseURL:"https://lista-agoron-ea924-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"lista-agoron-ea924"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const CATEGORIES=[
  {id:'fav',    label:'❤️ Αγαπημένα',    items:[],dynamic:true},
  {id:'dairy',  label:'🥛 Γαλακτοκομικά', items:['Γάλα','Γιαούρτι','Τυρί Φέτα','Βούτυρο','Κρέμα γάλακτος','Τυρί τριμμένο','Αυγά']},
  {id:'meat',   label:'🥩 Κρέας / Ψάρι',  items:['Κοτόπουλο','Κιμάς','Χοιρινό','Μοσχάρι','Ψάρι','Λουκάνικα','Μπέικον']},
  {id:'veg',    label:'🥦 Λαχανικά',      items:['Ντομάτες','Πατάτες','Κρεμμύδια','Σκόρδο','Αγγούρι','Μαρούλι','Καρότα','Πιπεριές','Κολοκυθάκια']},
  {id:'fruit',  label:'🍎 Φρούτα',         items:['Μήλα','Μπανάνες','Πορτοκάλια','Λεμόνια','Σταφύλια','Ροδάκινα','Φράουλες']},
  {id:'pantry', label:'🥫 Παντοπωλείο',   items:['Λάδι ελαιόλαδο','Ζυμαρικά','Ρύζι','Αλεύρι','Ζάχαρη','Αλάτι','Ξύδι','Κονσέρβες τόνου','Ντομάτα κονσέρβα','Φακές','Ρεβίθια']},
  {id:'spices', label:'🧂 Μπαχαρικά',     items:['Αλάτι','Πιπέρι','Πάπρικα','Ρίγανη','Κανέλλα','Γαρύφαλλο','Κύμινο','Μπαχάρι']},
  {id:'bakery', label:'🧁 Αρτοποιείο',    items:['Ψωμί','Φρυγανιές','Κριτσίνια','Παξιμάδια','Πίτα']},
  {id:'drinks', label:'🧃 Ροφήματα',      items:['Νερό','Χυμός πορτοκάλι','Καφές','Τσάι','Αναψυκτικά','Μπύρα','Κρασί']},
  {id:'clean',  label:'🧴 Καθαριότητα',   items:['Απορρυπαντικό','Χαρτί υγείας','Χαρτί κουζίνας','Σαπούνι','Σαμπουάν','Αφρόλουτρο','Οδοντόκρεμα','Σφουγγάρια','Λευκαντικό','Μαλακτικό']},
  {id:'house',  label:'🧹 Είδη Σπιτιού',  items:['Σακούλες σκουπιδιών','Σφουγγαρίστρα','Σκούπα','Χαρτοπετσέτες','Μεμβράνη','Αλουμινόχαρτο']}
];
const ALL_PRODUCTS=[...new Set(CATEGORIES.filter(c=>c.id!=='fav').flatMap(c=>c.items))];
const SUPERMARKET_ORDER=['fav','veg','fruit','dairy','meat','bakery','pantry','spices','drinks','clean','house'];

let pinBuffer='',activeTab='add',addCategory='dairy',showLastItems=false;
let sharedList={},favItems=[],modalUnit='τεμ.';
let roomKey=null,listRef=null,favRef=null;
let unsubList=null,unsubFav=null,suggIdx=-1;
let loginMode=null,failedAttempts=0;
const MAX_ATTEMPTS=5;

window.addEventListener('load',()=>{
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS&&!window.navigator.standalone){const h=document.getElementById('iosInstallHint');if(h)h.style.display='block';}
  const saved=localStorage.getItem('savedPin');
  if(saved){
    loginMode='join';pinBuffer=saved;
    document.getElementById('modeSelect').style.display='none';
    document.getElementById('pinEntry').style.display='none';
    document.getElementById('autoLoginMsg').style.display='block';
    setTimeout(tryLogin,300);
  }
});

window.selectMode=mode=>{loginMode=mode;showPinEntry(mode);};
function showPinEntry(mode){
  document.getElementById('modeSelect').style.display='none';
  document.getElementById('pinEntry').style.display='block';
  document.getElementById('modeLabel').textContent=
    mode==='create'?'Επέλεξε 6ψήφιο PIN για τον νέο σου λογαριασμό':'Εισάγετε το 6ψήφιο PIN σας';
}
window.backToMode=()=>{
  loginMode=null;pinBuffer='';failedAttempts=0;
  updateDots();document.getElementById('errMsg').textContent='';
  document.getElementById('modeSelect').style.display='block';
  document.getElementById('pinEntry').style.display='none';
};
window.addDigit=d=>{if(pinBuffer.length<6){pinBuffer+=d;updateDots();if(pinBuffer.length===6)setTimeout(tryLogin,200);}};
window.delDigit=()=>{pinBuffer=pinBuffer.slice(0,-1);updateDots();};
window.clearPin=()=>{pinBuffer='';updateDots();document.getElementById('errMsg').textContent='';};
function updateDots(){for(let i=0;i<6;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);}

async function tryLogin(){
  if(failedAttempts>=MAX_ATTEMPTS){document.getElementById('errMsg').textContent='❌ Πολλές αποτυχίες. Ανανεώστε τη σελίδα.';return;}
  const pin=pinBuffer;
  document.getElementById('errMsg').textContent='⏳ Έλεγχος...';
  try{
    const snap=await get(ref(db,'rooms/'+pin));
    if(loginMode==='create'){
      if(snap.exists()){
        failedAttempts++;const left=MAX_ATTEMPTS-failedAttempts;
        document.getElementById('errMsg').textContent=left>0?`❌ Κατειλημμένο PIN — δοκιμάστε άλλο (${left} απόπειρες)`:'❌ Κατειλημμένο PIN. Ανανεώστε τη σελίδα.';
        pinBuffer='';updateDots();
      } else {
        await set(ref(db,'rooms/'+pin+'/meta'),{created:Date.now()});
        enterRoom(pin);setStatus('ok','✅ Νέος λογαριασμός δημιουργήθηκε! PIN: '+pin);
      }
    } else {
      if(snap.exists()){enterRoom(pin);}
      else{
        failedAttempts++;const left=MAX_ATTEMPTS-failedAttempts;
        document.getElementById('autoLoginMsg').style.display='none';
        document.getElementById('modeSelect').style.display='block';
        document.getElementById('errMsg').textContent=left>0?`❌ Άγνωστο PIN (${left} απόπειρες)`:'❌ Πολλές αποτυχίες. Ανανεώστε τη σελίδα.';
        pinBuffer='';updateDots();
      }
    }
  }catch(err){
    console.error(err);
    document.getElementById('errMsg').textContent='❌ Σφάλμα σύνδεσης';
    document.getElementById('autoLoginMsg').style.display='none';
    document.getElementById('modeSelect').style.display='block';
    pinBuffer='';updateDots();
  }
}

function enterRoom(pin){
  const chk=document.getElementById('rememberPin');
  if(chk&&chk.checked)localStorage.setItem('savedPin',pin);else localStorage.removeItem('savedPin');
  roomKey=pin;
  listRef=ref(db,'rooms/'+pin+'/lista');
  favRef=ref(db,'rooms/'+pin+'/favorites');
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('hdrSub').textContent='PIN: '+pin.slice(0,3)+'···';
  startListeners();renderContent();updateFab();
}

window.logout=()=>{
  if(unsubList)unsubList();if(unsubFav)unsubFav();
  roomKey=null;pinBuffer='';sharedList={};favItems=[];loginMode=null;failedAttempts=0;
  updateDots();document.getElementById('errMsg').textContent='';
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');

function normGr(s){
  return s.toLowerCase()
    .replace(/[άἀἁὰ]/g,'α').replace(/[έἐἑὲ]/g,'ε').replace(/[ήἠἡὴ]/g,'η')
    .replace(/[ίἰἱὶϊΐ]/g,'ι').replace(/[όὀὁὸ]/g,'ο').replace(/[ύὐὑὺϋΰ]/g,'υ')
    .replace(/[ώὠὡὼ]/g,'ω').trim();
}

// Επιστρέφει την τελευταία καταχωρημένη τιμή για ένα προϊόν
function getLastPrice(name){
  const items=Object.values(sharedList)
    .filter(i=>normGr(i.name)===normGr(name)&&i.price>0)
    .sort((a,b)=>(b.ts||0)-(a.ts||0));
  return items.length>0?items[0].price:null;
}

window.showSuggestions=val=>{
  const box=document.getElementById('suggBox');
  if(!val||val.length<2){box.style.display='none';return;}
  const q=normGr(val);
  const history=[...new Set(Object.values(sharedList).map(i=>i.name))];
  const pool=[...new Set([...history,...ALL_PRODUCTS,...favItems])];
  const matches=pool.filter(p=>normGr(p).includes(q)&&normGr(p)!==q).slice(0,6);
  if(matches.length===0){box.style.display='none';return;}
  suggIdx=-1;
  box.innerHTML=matches.map((m,i)=>`<div class="sugg-item" id="sugg-${i}" onclick="pickSugg('${m.replace(/'/g,"\\'")}')">${m}</div>`).join('');
  box.style.display='block';
};
window.pickSugg=val=>{document.getElementById('manualInput').value=val;document.getElementById('suggBox').style.display='none';suggIdx=-1;};
window.handleKey=e=>{
  const box=document.getElementById('suggBox');const items=box.querySelectorAll('.sugg-item');
  if(e.key==='ArrowDown'){e.preventDefault();suggIdx=Math.min(suggIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();suggIdx=Math.max(suggIdx-1,-1);}
  else if(e.key==='Enter'){if(suggIdx>=0&&items[suggIdx]){items[suggIdx].click();return;}manualAdd();return;}
  else if(e.key==='Escape'){box.style.display='none';return;}
  items.forEach((el,i)=>el.classList.toggle('sugg-sel',i===suggIdx));
};
document.addEventListener('click',e=>{
  if(!e.target.closest('#suggBox')&&!e.target.closest('#manualInput')){const b=document.getElementById('suggBox');if(b)b.style.display='none';}
});

window.startVoice=()=>{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('warn','⚠️ Φωνητική εισαγωγή: χρησιμοποιήστε Chrome');return;}
  const rec=new SR();rec.lang='el-GR';rec.continuous=false;rec.interimResults=false;
  const btn=document.getElementById('micBtn');
  if(btn){btn.classList.add('recording');btn.textContent='🔴';}
  rec.onresult=e=>{
    const txt=e.results[0][0].transcript;
    const inp=document.getElementById('manualInput');
    if(inp){inp.value=txt;showSuggestions(txt);}
    if(btn){btn.classList.remove('recording');btn.textContent='🎤 Φωνητική εισαγωγή';}
    setStatus('ok','🎤 Αναγνωρίστηκε: '+txt);
  };
  rec.onerror=e=>{
    if(btn){btn.classList.remove('recording');btn.textContent='🎤 Φωνητική εισαγωγή';}
    const msgs={'not-allowed':'⚠️ Απαιτείται άδεια μικροφώνου','network':'⚠️ Απαιτείται σύνδεση internet','language-not-supported':'⚠️ Εγκαταστήστε ελληνικά στο κινητό','no-speech':'⚠️ Δεν ακούστηκε ομιλία','service-not-allowed':'⚠️ Χρησιμοποιήστε Chrome'};
    setStatus('warn',msgs[e.error]||'⚠️ Σφάλμα ('+e.error+')');
  };
  rec.onend=()=>{if(btn){btn.classList.remove('recording');btn.textContent='🎤 Φωνητική εισαγωγή';}};
  rec.start();
};

function addItem(name,cat,addToFav){
  const existing=Object.values(sharedList).find(i=>normGr(i.name)===normGr(name)&&!i.done);
  if(existing){setStatus('warn','⚠️ Ήδη στη λίστα: '+name);return;}
  const histKey='lastItems_'+roomKey;
  const hist=[name,...JSON.parse(localStorage.getItem(histKey)||'[]').filter(h=>normGr(h)!==normGr(name))].slice(0,10);
  localStorage.setItem(histKey,JSON.stringify(hist));
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2);
  set(ref(db,'rooms/'+roomKey+'/lista/'+id),{name,cat,done:false,ts:Date.now()});
  if(addToFav&&!favItems.includes(name)){set(favRef,[...favItems,name]);setStatus('ok','✅ Προστέθηκε στη λίστα & Αγαπημένα: '+name);}
  else{setStatus('ok','✅ Προστέθηκε: '+name);}
}

function buildShareText(){
  const items=Object.values(sharedList).filter(i=>!i.done);
  if(items.length===0)return 'Η λίστα αγορών είναι άδεια.';
  let txt='🛒 ΛΙΣΤΑ ΑΓΟΡΩΝ\n\n';
  items.forEach(i=>{
    const q=i.qty&&i.unit?` (${i.qty} ${i.unit})`:'';
    const b=i.brand?` [${i.brand}]`:'';
    const p=i.price>0?` €${(i.price*(i.qty||1)).toFixed(2)}`:'';
    txt+=`• ${i.name.toUpperCase()}${q}${b}${p}\n`;
  });
  const total=items.filter(i=>i.price>0).reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
  txt+=`\nΣύνολο: ${items.length} προϊόντα`;
  if(total>0)txt+=` | €${total.toFixed(2)}`;
  return txt;
}

};

function fbCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}

function setStatus(type,msg){
  const bar=document.getElementById('statusBar'),txt=document.getElementById('statusTxt');
  bar.className='status-bar '+(type==='ok'?'ok':type==='err'?'err':'');
  txt.textContent=msg;
  if(type!=='err')setTimeout(()=>{bar.className='status-bar ok';txt.textContent='🟢 Live σύνδεση ενεργή';},2500);
}

const GROQ_KEY='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';

const RECIPE_PROMPT=`Είσαι ειδικός Έλληνας μάγειρας. Για κάθε αίτημα δώσε ΑΚΡΙΒΩΣ 3 συνταγές σε JSON array.
Μορφή: [{"name":"...","description":"...","servings":4,"ingredients":[{"name":"...","qty":1,"unit":"τεμ.","cat":"pantry"}]}]

window.searchRecipes=async()=>{
  const q=(document.getElementById('recipeQuery')?.value||'').trim();
  if(!q)return;
  const res=document.getElementById('recipeResults');
  res.innerHTML=`<div style="text-align:center;padding:2.5rem;color:#888"><div style="font-size:2.5rem;margin-bottom:0.75rem">⏳</div><div>Αναζήτηση συνταγών...</div></div>`;
  try{
    const resp=await fetch(GROQ_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama3-8b-8192',
        messages:[{role:'system',content:RECIPE_PROMPT},{role:'user',content:q}],
        max_tokens:1800,temperature:0.7
      })
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.choices?.[0]?.message?.content||'[]';
    const clean=text.replace(/```json|```/g,'').trim();
    const recipes=JSON.parse(clean);
    window._recipes=recipes;
    renderRecipeCards(recipes);
  }catch(err){
    console.error(err);
    res.innerHTML=`<div style="text-align:center;padding:2rem;color:#e53935">❌ Σφάλμα — δοκιμάστε ξανά</div>`;
  }
};

function renderRecipeCards(recipes){
  const res=document.getElementById('recipeResults');
  if(!recipes?.length){res.innerHTML=`<div style="text-align:center;padding:2rem;color:#aaa">Δεν βρέθηκαν συνταγές</div>`;return;}
  res.innerHTML=recipes.map((r,i)=>`
    <div style="border:1.5px solid #e8f5ee;border-radius:14px;margin-bottom:0.75rem;overflow:hidden">
      <div style="padding:0.9rem;cursor:pointer;background:#f8fffe" onclick="toggleRecipe(${i})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="font-weight:700;font-size:0.92rem;margin-bottom:2px">${r.name}</div>
            <div style="font-size:0.74rem;color:#888">${r.description}</div>
            <div style="font-size:0.7rem;color:#1a7f4b;margin-top:4px">👥 ${r.servings||4} μερίδες &nbsp;·&nbsp; 🧺 ${r.ingredients?.length||0} υλικά</div>
          </div>
          <span id="ra-${i}" style="color:#1a7f4b;font-size:1rem;margin-left:8px;flex-shrink:0">▼</span>
        </div>
      </div>
      <div id="rd-${i}" style="display:none;padding:0.9rem;border-top:1px solid #e8f5ee;background:#fff">
        <div style="font-size:0.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">Υλικά</div>
        ${(r.ingredients||[]).map(ing=>`
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;padding:4px 0;border-bottom:1px solid #f5f5f5">
            <span>${ing.name}</span>
            <span style="color:#1a7f4b;font-weight:600;white-space:nowrap;margin-left:8px">${ing.qty||''} ${ing.unit||''}</span>
          </div>`).join('')}
        <button onclick="addRecipeIngredients(${i},event)" style="width:100%;margin-top:1rem;padding:0.75rem;background:#1a7f4b;color:#fff;border:none;border-radius:12px;font-weight:700;font-size:0.9rem;cursor:pointer">
          ➕ Προσθήκη υλικών στη λίστα
        </button>
      </div>
    </div>`).join('');
}

window.toggleRecipe=i=>{
  const d=document.getElementById(`rd-${i}`);
  const a=document.getElementById(`ra-${i}`);
  const open=d.style.display!=='none';
  document.querySelectorAll('[id^="rd-"]').forEach(x=>x.style.display='none');
  document.querySelectorAll('[id^="ra-"]').forEach(x=>x.textContent='▼');
  if(!open){d.style.display='block';a.textContent='▲';}
};

window.addRecipeIngredients=(i,evt)=>{
  evt.stopPropagation();
  const recipe=window._recipes?.[i];
  if(!recipe)return;
  let added=0;
  (recipe.ingredients||[]).forEach(ing=>{
    const name=(ing.name||'').trim();
    if(!name)return;
    const existing=Object.values(sharedList).find(it=>normGr(it.name)===normGr(name)&&!it.done);
    if(!existing){
      const id=Date.now().toString(36)+Math.random().toString(36).slice(2);
      const item={name,cat:ing.cat||'pantry',done:false,ts:Date.now()};
      if(ing.qty)item.qty=ing.qty;
      if(ing.unit)item.unit=ing.unit;
      set(ref(db,'rooms/'+roomKey+'/lista/'+id),item);
      added++;
    }
  });
  document.getElementById('recipeModal')?.remove();
  setStatus('ok',`✅ Προστέθηκαν ${added} υλικά από «${recipe.name}»`);
  setTab('all');
};

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;

});
window.addEventListener('appinstalled',()=>{
  deferredPrompt=null;const btn=document.getElementById('installBtn');if(btn)btn.style.display='none';
});
window.installApp=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();await deferredPrompt.userChoice;
  deferredPrompt=null;const btn=document.getElementById('installBtn');if(btn)btn.style.display='none';
};
